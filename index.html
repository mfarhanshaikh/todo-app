<!doctype html>

<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            display: ["Inter"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display min-h-screen text-slate-800 dark:text-slate-200">
  <div class="max-w-3xl mx-auto px-4 py-12">
    <header class="mb-10 text-center">
      <div class="flex items-center justify-between mb-2">
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-slate-900 dark:text-white">
          Daily Tasks
        </h1>
        <button id="theme-toggle"
          class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span class="material-icons dark:hidden">dark_mode</span>
          <span class="material-icons hidden dark:block">light_mode</span>
        </button>
      </div>
      <p class="text-slate-500 dark:text-slate-400">
        Stay organized and get things done.
      </p>
    </header>
    <div class="glass p-6 rounded-xl shadow-sm mb-8 relative z-20">
      <div class="flex flex-col md:flex-row gap-3">
        <div class="relative flex-grow">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <span class="material-icons text-lg">add_task</span>
          </span>
          <input
            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-lg transition-all outline-none text-slate-900 dark:text-white"
            id="input-task" placeholder="Add a new task..." type="text" />
        </div>
        <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
          <div class="relative flex-grow min-w-[120px]" id="priority-selector-container">
            <button id="priority-dropdown-btn"
              class="w-full h-full py-3 pl-3 pr-8 bg-slate-50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-lg transition-all outline-none text-slate-900 dark:text-white flex items-center justify-between text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">
              <span id="current-priority-text">Medium</span>
              <span
                class="material-icons text-base text-slate-400 dropdown-arrow transition-transform">expand_more</span>
            </button>
            <div id="priority-options"
              class="absolute top-full left-0 w-full mt-2 hidden glass rounded-xl shadow-xl z-50 overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200">
              <div
                class="priority-opt p-3 hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer flex items-center gap-2 transition-colors"
                data-value="low">
                <span class="h-2 w-2 rounded-full bg-green-500"></span>
                <span class="text-sm font-medium">Low</span>
              </div>
              <div
                class="priority-opt p-3 hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer flex items-center gap-2 transition-colors"
                data-value="medium">
                <span class="h-2 w-2 rounded-full bg-yellow-500"></span>
                <span class="text-sm font-medium">Medium</span>
              </div>
              <div
                class="priority-opt p-3 hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer flex items-center gap-2 transition-colors"
                data-value="high">
                <span class="h-2 w-2 rounded-full bg-red-500"></span>
                <span class="text-sm font-medium">High</span>
              </div>
            </div>
          </div>
          <div class="flex gap-2">
            <button
              class="bg-primary hover:bg-primary/90 text-white font-semibold flex-grow sm:flex-grow-0 px-6 py-3 rounded-lg transition-colors flex items-center justify-center gap-2"
              id="task-btn" type="button">
              <span class="material-icons text-sm">add</span>
              <span class="btn-text">Add</span>
            </button>
            <button id="cancel-edit"
              class="hidden bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 font-semibold px-4 py-3 rounded-lg transition-colors items-center justify-center"
              type="button">
              <span class="material-icons">close</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 px-2">
      <div class="flex gap-4 w-full sm:w-auto overflow-x-auto pb-2 sm:pb-0 scrollbar-hide" id="filter-buttons">
        <button data-filter="all"
          class="filter-btn text-primary font-semibold text-sm border-b-2 border-primary pb-1 whitespace-nowrap">
          All Tasks
        </button>
        <button data-filter="active"
          class="filter-btn text-slate-500 dark:text-slate-400 font-medium text-sm hover:text-primary transition-colors pb-1 whitespace-nowrap">
          Active
        </button>
        <button data-filter="completed"
          class="filter-btn text-slate-500 dark:text-slate-400 font-medium text-sm hover:text-primary transition-colors pb-1 whitespace-nowrap">
          Completed
        </button>
      </div>
      <div class="flex items-center justify-between w-full sm:w-auto gap-4">
        <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold" id="task-count">3 tasks
          remaining</span>
        <div class="flex gap-3">
          <button
            class="hide-completed-task flex items-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors text-xs whitespace-nowrap">
            <span class="material-icons text-sm">visibility_off</span>
            <span class="hide-text">Hide Completed</span>
          </button>
          <button id="clear-completed"
            class="flex items-center gap-1 text-slate-500 dark:text-slate-400 hover:text-red-500 transition-colors text-xs whitespace-nowrap">
            <span class="material-icons text-sm">cleaning_services</span>
            Clear
          </button>
        </div>
      </div>
    </div>
    <div class="space-y-3" id="task-list"></div>
    <footer class="mt-12 text-center">
      <div
        class="inline-flex items-center gap-2 bg-primary/5 dark:bg-primary/10 px-4 py-2 rounded-full border border-primary/10 max-w-full">
        <span class="material-icons text-primary text-xs sm:text-sm">tips_and_updates</span>
        <p class="text-[10px] sm:text-sm text-slate-600 dark:text-slate-400 font-medium leading-tight">
          Pro-tip: Focus on 3 main tasks every day.
        </p>
      </div>
      <div class="mt-8 text-xs text-slate-400 dark:text-slate-500">
        Made with ❤️ by mfarhanshaikh
      </div>
    </footer>
  </div>
  <div
    class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 rounded-full blur-3xl opacity-50 translate-x-1/2 -translate-y-1/2">
  </div>
  <div
    class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-primary/5 rounded-full blur-3xl opacity-30 -translate-x-1/2 translate-y-1/2">
  </div>

  <script src="script.js"></script>
</body>

</html>
