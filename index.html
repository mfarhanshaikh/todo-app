<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Todo App</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen text-slate-800 dark:text-slate-200"
  >
    <div class="max-w-3xl mx-auto px-4 py-12">
      <header class="mb-10 text-center">
        <h1
          class="text-4xl font-bold tracking-tight text-slate-900 dark:text-white mb-2"
        >
          Daily Tasks
        </h1>
        <p class="text-slate-500 dark:text-slate-400">
          Stay organized and get things done.
        </p>
      </header>
      <div
        class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 mb-8"
      >
        <div class="flex flex-col md:flex-row gap-3">
          <div class="relative flex-grow">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400"
            >
              <span class="material-icons text-lg">add_task</span>
            </span>
            <input
              class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-lg transition-all outline-none text-slate-900 dark:text-white"
              id="input-task"
              placeholder="Add a new task..."
              type="text"
            />
          </div>
          <button
            class="bg-primary hover:bg-primary/90 text-white font-semibold px-8 py-3 rounded-lg transition-colors flex items-center justify-center gap-2"
            id="task-btn"
            type="button"
          >
            <span class="material-icons text-sm">add</span>
            Add Task
          </button>
        </div>
      </div>
      <div class="flex items-center justify-between mb-6 px-2">
        <div class="flex gap-4" id="filter-buttons">
          <button data-filter="all" class="filter-btn text-primary font-semibold text-sm border-b-2 border-primary pb-1">All Tasks</button>
          <button data-filter="active" class="filter-btn text-slate-500 dark:text-slate-400 font-medium text-sm hover:text-primary transition-colors pb-1">Active</button>
          <button data-filter="completed" class="filter-btn text-slate-500 dark:text-slate-400 font-medium text-sm hover:text-primary transition-colors pb-1">Completed</button>
        </div>
        <div class="flex items-center gap-3">
          <span
            class="text-xs text-slate-400 uppercase tracking-wider font-semibold"
            >3 tasks remaining</span
          >
          <button
            class="hide-completed-task flex items-center gap-1 text-slate-500 dark:text-slate-400 hover:text-red-500 transition-colors text-sm"
          >
            <span class="material-icons text-base">visibility_off</span>
            Hide Completed
          </button>
        </div>
      </div>
      <div 
        class="space-y-3"
        id="task-list"
      >
        
      </div>
      <footer class="mt-12 text-center">
        <div
          class="inline-flex items-center gap-2 bg-primary/5 dark:bg-primary/10 px-4 py-2 rounded-full border border-primary/10"
        >
          <span class="material-icons text-primary text-sm"
            >tips_and_updates</span
          >
          <p class="text-sm text-slate-600 dark:text-slate-400 font-medium">
            Pro-tip: Focus on 3 main tasks every day to boost productivity.
          </p>
        </div>
        <div
          class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-800 flex justify-center gap-8 text-slate-400 text-xs font-semibold uppercase tracking-widest"
        >
          <a class="hover:text-primary transition-colors" href="#">Privacy</a>
          <a class="hover:text-primary transition-colors" href="#">Terms</a>
          <a class="hover:text-primary transition-colors" href="#">Support</a>
        </div>
        <div class="mt-8 text-xs text-slate-400 dark:text-slate-500">Made with ❤️ by Mohammad Farhan Shaikh</div>
      </footer>
    </div>
    <div
      class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 rounded-full blur-3xl opacity-50 translate-x-1/2 -translate-y-1/2"
    ></div>
    <div
      class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-primary/5 rounded-full blur-3xl opacity-30 -translate-x-1/2 translate-y-1/2"
    ></div>

    <script src="script.js"></script>

  </body>
</html>
